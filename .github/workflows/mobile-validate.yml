name: mobile-validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mobile-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mobile config contract test
        run: pnpm exec vitest run config/stages.test.ts config/index.test.ts

      - name: Typecheck mobile app
        run: pnpm exec tsc --noEmit

      - name: Lint mobile app
        run: pnpm exec eslint .

      - name: Export iOS production bundle
        env:
          APP_STAGE: prd
        run: pnpm exec expo export --platform ios --output-dir /tmp/mereb-mobile-export-ios

      - name: Export Android production bundle
        env:
          APP_STAGE: prd
        run: pnpm exec expo export --platform android --output-dir /tmp/mereb-mobile-export-android
