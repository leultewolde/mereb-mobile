name: mobile-prd-release

on:
  push:
    tags:
      - mobile-v*

defaults:
  tools:
    node: "20"
    corepack: true
    pnpm: "10.30.1"

jobs:
  validate:
    name: Validate mobile repo
    runs_on: linux-medium
    environment: production
    env:
      APP_STAGE: prd
    steps:
      - uses: eas/checkout
      - name: Install mobile dependencies
        run: pnpm install --frozen-lockfile
      - name: Mobile config contract test
        run: pnpm exec vitest run config/stages.test.ts config/index.test.ts
      - name: Typecheck mobile app
        run: pnpm exec tsc --noEmit
      - name: Lint mobile app
        run: pnpm exec eslint .

  build_ios:
    name: Build iOS (prd)
    needs:
      - validate
    type: build
    environment: production
    env:
      APP_STAGE: prd
    params:
      platform: ios
      profile: prd

  build_android:
    name: Build Android (prd)
    needs:
      - validate
    type: build
    environment: production
    env:
      APP_STAGE: prd
    params:
      platform: android
      profile: prd

  submit_ios:
    name: Submit iOS to TestFlight (prd)
    needs:
      - build_ios
    type: submit
    environment: production
    env:
      APP_STAGE: prd
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: prd

  submit_android:
    name: Submit Android to Play Production (10% rollout)
    needs:
      - build_android
    type: submit
    environment: production
    env:
      APP_STAGE: prd
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: prd

  next_steps:
    name: Prd release summary
    needs:
      - build_ios
      - build_android
      - submit_ios
      - submit_android
    type: doc
    params:
      md: |
        # Mobile prd release submitted

        - Workflow run: ${{ workflow.url }}
        - Source ref: `${{ github.ref_name || 'manual-run' }}`
        - iOS build ID: `${{ needs.build_ios.outputs.build_id }}`
        - Android build ID: `${{ needs.build_android.outputs.build_id }}`
        - iOS submission: App Store Connect / TestFlight via submit profile `prd`
        - Android submission: Google Play Production at 10% rollout via submit profile `prd`

        ## Next steps

        - Monitor crash-free rate / Sentry for 24–48h.
        - In Play Console, promote the rollout from 10% to 100% when metrics look clean.
        - In App Store Connect, release the iOS TestFlight build to the App Store.
